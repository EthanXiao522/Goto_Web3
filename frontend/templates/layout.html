{{define "app-layout"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} - Web3 Infra Tracker</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="app-layout">
  {{template "sidebar" .}}
  <main class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <a href="/" class="btn btn-outline btn-sm" title="返回首页">&#8962; 首页</a>
        <span class="breadcrumb" style="margin-left:12px">{{.Breadcrumb}}</span>
      </div>
      <div class="topbar-right">
        <span class="user-greeting">{{if .User}}{{.User.Username}}{{end}}</span>
        <a href="/logout" class="btn btn-outline btn-sm">退出</a>
      </div>
    </header>
    <div id="toast-container"></div>
{{end}}

{{define "app-layout-end"}}
  </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
