{{template "app-layout" .}}
<div class="profile-page">
  <h1 class="page-title">修改个人信息</h1>
  <div class="profile-card">
    <form id="profileForm">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input type="text" id="username" class="form-input" value="{{.User.Username}}" minlength="2" maxlength="64">
        <div class="validation-msg" id="usernameMsg"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">邮箱</label>
        <input type="text" id="email" class="form-input" value="{{.User.Email}}">
        <div class="validation-msg" id="emailMsg"></div>
      </div>
      <hr style="border-color:var(--border-color);margin:24px 0">
      <div class="form-group">
        <label class="form-label" for="oldPassword">旧密码（修改密码时必填）</label>
        <input type="password" id="oldPassword" class="form-input" placeholder="输入旧密码">
      </div>
      <div class="form-group">
        <label class="form-label" for="newPassword">新密码（不修改则留空）</label>
        <input type="password" id="newPassword" class="form-input" placeholder="至少6位" minlength="6">
        <div class="validation-msg" id="passwordMsg"></div>
      </div>
      <div id="profileMsg" style="padding:10px 14px;border-radius:6px;margin-top:12px;display:none;text-align:center;font-weight:600"></div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px">保存修改</button>
    </form>
  </div>
</div>
<script>
(function(){
  var valid = { username: true, email: true, password: true };
  var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function showMsg(msg, ok) {
    var el = document.getElementById('profileMsg');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.color = ok ? 'var(--success)' : 'var(--danger)';
    el.style.background = ok ? 'rgba(0,255,136,0.1)' : 'rgba(255,71,87,0.12)';
    el.style.border = ok ? '1px solid rgba(0,255,136,0.3)' : '1px solid rgba(255,71,87,0.4)';
    if (ok) setTimeout(function(){ el.style.display = 'none'; }, 3000);
  }

  var usernameTimer;
  document.getElementById('username').addEventListener('input', function(){
    var val = this.value.trim();
    clearTimeout(usernameTimer);
    if (val === '{{.User.Username}}') { valid.username = true; document.getElementById('usernameMsg').innerHTML = ''; return; }
    if (val.length < 2) { valid.username = false; document.getElementById('usernameMsg').innerHTML = '<span style="color:var(--danger)">至少2个字符</span>'; return; }
    usernameTimer = setTimeout(async function(){
      try {
        var r = await fetch('/api/v1/auth/check-username?username=' + encodeURIComponent(val));
        var d = await r.json();
        if (d.data.available) {
          valid.username = true;
          document.getElementById('usernameMsg').innerHTML = '<span style="color:var(--success)">✓ 可用</span>';
        } else {
          valid.username = false;
          document.getElementById('usernameMsg').innerHTML = '<span style="color:var(--danger)">✗ ' + d.data.reason + '</span>';
        }
      } catch(e) { valid.username = false; }
    }, 500);
  });

  document.getElementById('email').addEventListener('blur', function(){
    var val = this.value.trim();
    if (val === '{{.User.Email}}') { valid.email = true; document.getElementById('emailMsg').innerHTML = ''; return; }
    if (!emailRe.test(val)) { valid.email = false; document.getElementById('emailMsg').innerHTML = '<span style="color:var(--danger)">邮箱格式不正确</span>'; return; }
    valid.email = true;
    document.getElementById('emailMsg').innerHTML = '<span style="color:var(--success)">✓ 格式正确</span>';
  });

  document.getElementById('newPassword').addEventListener('input', function(){
    var val = this.value;
    if (val.length === 0) { valid.password = true; document.getElementById('passwordMsg').innerHTML = ''; return; }
    if (val.length >= 6) { valid.password = true; document.getElementById('passwordMsg').innerHTML = '<span style="color:var(--success)">✓ 符合要求</span>'; }
    else { valid.password = false; document.getElementById('passwordMsg').innerHTML = '<span style="color:var(--danger)">至少6位</span>'; }
  });

  document.getElementById('profileForm').addEventListener('submit', async function(e){
    e.preventDefault();
    if (!valid.username || !valid.email || !valid.password) { showMsg('请修正表单中的错误', false); return; }
    var body = {
      username: document.getElementById('username').value.trim(),
      email: document.getElementById('email').value.trim()
    };
    var np = document.getElementById('newPassword').value;
    if (np) {
      body.new_password = np;
      body.old_password = document.getElementById('oldPassword').value;
    }
    try {
      var token = localStorage.getItem('token');
      var r = await fetch('/api/v1/auth/profile', {
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify(body)
      });
      var d = await r.json();
      if (d.code === 200) {
        showMsg('修改成功', true);
        if (d.data && d.data.user) localStorage.setItem('user', JSON.stringify(d.data.user));
      } else {
        showMsg(d.msg || '修改失败', false);
      }
    } catch(ex) { showMsg('网络错误', false); }
  });
})();
</script>
{{template "app-layout-end" .}}
